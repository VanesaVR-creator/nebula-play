<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Usuario | Nebula</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <main class="container">
    <a class="back-link" href="/"><span>←</span><span>Volver</span></a>
    <section class="page-header">
      <h1>Registro de Usuario</h1>
      <p>Completa tu perfil profesional</p>
    </section>

    <section class="card panel" style="max-width: 780px; margin: 24px auto 0;">
      <form id="registerUserForm" class="form-grid">
        <div class="field" style="align-items:center; text-align:center;">
          <div class="avatar">👤</div>
          <label for="foto_perfil">Foto de perfil</label>
          <input class="input" id="foto_perfil" name="foto_perfil" type="file" accept="image/*" />
        </div>
        <div class="field">
          <label for="nombre_completo">Nombre completo *</label>
          <input class="input" id="nombre_completo" name="nombre_completo" required />
        </div>
        <div class="form-grid form-grid--2">
          <div class="field">
            <label for="fecha_nacimiento">Fecha de nacimiento *</label>
            <input class="input" id="fecha_nacimiento" name="fecha_nacimiento" type="date" required />
          </div>
          <div class="field">
            <label for="sexo">Sexo *</label>
            <select class="select" id="sexo" name="sexo" required>
              <option value="">Seleccionar</option>
              <option>Masculino</option>
              <option>Femenino</option>
              <option>Otro</option>
              <option>Prefiero no decir</option>
            </select>
          </div>
        </div>
        <div class="form-grid form-grid--2">
          <div class="field">
            <label for="email">Correo electrónico *</label>
            <input class="input" id="email" name="email" type="email" required />
          </div>
          <div class="field">
            <label for="password">Contraseña *</label>
            <input class="input" id="password" name="password" type="password" required />
          </div>
        </div>
        <div class="form-grid form-grid--2">
          <div class="field">
            <label for="puesto">Puesto actual o deseado *</label>
            <input class="input" id="puesto" name="puesto" placeholder="Desarrollador Full Stack" required />
          </div>
          <div class="field">
            <label for="anios_experiencia">Años de experiencia *</label>
            <select class="select" id="anios_experiencia" name="anios_experiencia" required>
              <option value="">Seleccionar</option>
              <option>Sin experiencia</option>
              <option>1 año</option>
              <option>2 años</option>
              <option>3 años</option>
              <option>4 años</option>
              <option>5 años o más</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="descripcion_experiencia">Descripción de experiencia laboral</label>
          <textarea class="textarea" id="descripcion_experiencia" name="descripcion_experiencia" placeholder="Describe tu experiencia profesional, habilidades y logros..."></textarea>
        </div>
        <div id="registerMessage" class="small"></div>
        <button class="btn btn-primary" type="submit">Crear cuenta</button>
      </form>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script>
    const { $, api, toast } = window.Nebula;
    $('#registerUserForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const message = $('#registerMessage');
      const formData = new FormData(event.currentTarget);
      toast(message, 'Creando cuenta...', 'notice');
      try {
        const data = await api('/api/auth/register-user', { method: 'POST', body: formData });
        toast(message, 'Cuenta creada correctamente. Redirigiendo...', 'success');
        window.location.href = data.redirect;
      } catch (error) {
        toast(message, error.message, 'error');
      }
    });
  </script>
</body>
</html>
