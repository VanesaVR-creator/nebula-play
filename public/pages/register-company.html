<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Empresa | Nebula</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <main class="container">
    <a class="back-link" href="/"><span>←</span><span>Volver</span></a>
    <section class="page-header">
      <h1>Registro de Empresa</h1>
      <p>Encuentra el mejor talento para tu organización</p>
    </section>

    <section class="card panel" style="max-width: 780px; margin: 24px auto 0;">
      <form id="registerCompanyForm" class="form-grid">
        <div class="field" style="align-items:center; text-align:center;">
          <div class="avatar">🏢</div>
          <label for="logo_empresa">Logo de la empresa</label>
          <input class="input" id="logo_empresa" name="logo_empresa" type="file" accept="image/*" />
        </div>
        <div class="field">
          <label for="nombre_empresa">Nombre de la empresa *</label>
          <input class="input" id="nombre_empresa" name="nombre_empresa" required />
        </div>
        <div class="form-grid form-grid--2">
          <div class="field"><label for="rfc">RFC</label><input class="input" id="rfc" name="rfc" /></div>
          <div class="field"><label for="industria">Industria *</label><input class="input" id="industria" name="industria" required /></div>
        </div>
        <div class="form-grid form-grid--2">
          <div class="field"><label for="ubicacion">Ubicación *</label><input class="input" id="ubicacion" name="ubicacion" required /></div>
          <div class="field"><label for="sitio_web">Sitio web</label><input class="input" id="sitio_web" name="sitio_web" /></div>
        </div>
        <div class="form-grid form-grid--2">
          <div class="field"><label for="email">Email de contacto *</label><input class="input" id="email" name="email" type="email" required /></div>
          <div class="field"><label for="telefono">Teléfono de contacto</label><input class="input" id="telefono" name="telefono" /></div>
        </div>
        <div class="form-grid form-grid--2">
          <div class="field"><label for="responsable">Nombre del responsable *</label><input class="input" id="responsable" name="responsable" required /></div>
          <div class="field"><label for="puesto_responsable">Puesto del responsable</label><input class="input" id="puesto_responsable" name="puesto_responsable" /></div>
        </div>
        <div class="field"><label for="password">Contraseña *</label><input class="input" id="password" name="password" type="password" required /></div>
        <div id="registerCompanyMessage" class="small"></div>
        <button class="btn btn-primary" type="submit">Registrar empresa</button>
      </form>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script>
    const { $, api, toast } = window.Nebula;
    $('#registerCompanyForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const message = $('#registerCompanyMessage');
      const formData = new FormData(event.currentTarget);
      toast(message, 'Registrando empresa...', 'notice');
      try {
        const data = await api('/api/auth/register-company', { method: 'POST', body: formData });
        toast(message, 'Empresa registrada correctamente. Redirigiendo...', 'success');
        window.location.href = data.redirect;
      } catch (error) {
        toast(message, error.message, 'error');
      }
    });
  </script>
</body>
</html>
